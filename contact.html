<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-card {
            text-align: left;
            width: 420px;
        }

        .form-card h1 {
            text-align: center;
            margin-bottom: 8px;
        }

        .form-card .subtitle {
            text-align: center;
            font-size: 0.9em;
            color: #888;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.88em;
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
        }

        body.dark .form-group label {
            color: #aaa;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #dde1e7;
            border-radius: 8px;
            font-size: 0.95em;
            font-family: inherit;
            background-color: #fff;
            color: #333;
            transition: border-color 0.2s;
            outline: none;
        }

        body.dark .form-group input,
        body.dark .form-group select,
        body.dark .form-group textarea {
            background-color: #12151f;
            border-color: #333;
            color: #e0e0e0;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #007bff;
        }

        body.dark .form-group input:focus,
        body.dark .form-group select:focus,
        body.dark .form-group textarea:focus {
            border-color: #4da3ff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 6px;
        }

        .submit-btn:hover { background-color: #0056b3; }
        .submit-btn:active { transform: scale(0.98); }

        body.dark .submit-btn { background-color: #2979ff; }
        body.dark .submit-btn:hover { background-color: #1565c0; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.88em;
            color: #888;
            text-decoration: none;
        }

        .back-link:hover { color: #007bff; }

        /* 전송 완료 메시지 */
        .success-msg {
            display: none;
            text-align: center;
            padding: 18px;
            background-color: #e6f4ea;
            border-radius: 10px;
            color: #2e7d32;
            font-weight: 600;
            margin-bottom: 16px;
        }

        body.dark .success-msg {
            background-color: #1b3a2a;
            color: #81c784;
        }
    </style>
</head>
<body>
    <div class="container form-card">
        <div class="theme-toggle">
            <button id="light-mode">White Mode</button>
            <button id="dark-mode">Black Mode</button>
        </div>

        <h1>제휴 문의</h1>
        <p class="subtitle">파트너십 및 협업 관련 문의를 남겨주세요.</p>

        <div class="success-msg" id="success-msg">
            문의가 성공적으로 전송되었습니다! 빠른 시일 내에 답변드리겠습니다.
        </div>

        <form id="contact-form" action="https://formspree.io/f/xzdkognz" method="POST">

            <div class="form-group">
                <label for="company">회사명 / 단체명 *</label>
                <input type="text" id="company" name="company" placeholder="예) (주)홍길동컴퍼니" required>
            </div>

            <div class="form-group">
                <label for="name">담당자 이름 *</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required>
            </div>

            <div class="form-group">
                <label for="email">이메일 *</label>
                <input type="email" id="email" name="email" placeholder="example@company.com" required>
            </div>

            <div class="form-group">
                <label for="phone">연락처</label>
                <input type="tel" id="phone" name="phone" placeholder="010-0000-0000">
            </div>

            <div class="form-group">
                <label for="type">문의 유형 *</label>
                <select id="type" name="inquiry_type" required>
                    <option value="" disabled selected>선택해주세요</option>
                    <option value="광고/마케팅 제휴">광고 / 마케팅 제휴</option>
                    <option value="기술 파트너십">기술 파트너십</option>
                    <option value="콘텐츠 협업">콘텐츠 협업</option>
                    <option value="투자 문의">투자 문의</option>
                    <option value="기타">기타</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">문의 내용 *</label>
                <textarea id="message" name="message" placeholder="제휴 목적과 구체적인 내용을 자유롭게 작성해주세요." required></textarea>
            </div>

            <button type="submit" class="submit-btn">문의 보내기</button>
        </form>

        <a href="index.html" class="back-link">← 메인으로 돌아가기</a>
    </div>

    <script>
        // 다크모드 (기존 main.js 로직과 동일)
        const body = document.body;
        const lightBtn = document.getElementById('light-mode');
        const darkBtn = document.getElementById('dark-mode');

        function applyTheme(theme) {
            if (theme === 'dark') {
                body.classList.add('dark');
                darkBtn.classList.add('active');
                lightBtn.classList.remove('active');
            } else {
                body.classList.remove('dark');
                lightBtn.classList.add('active');
                darkBtn.classList.remove('active');
            }
        }

        const saved = localStorage.getItem('theme') || 'light';
        applyTheme(saved);

        lightBtn.addEventListener('click', () => { applyTheme('light'); localStorage.setItem('theme', 'light'); });
        darkBtn.addEventListener('click',  () => { applyTheme('dark');  localStorage.setItem('theme', 'dark');  });

        // Formspree AJAX 전송 (새 탭 이동 없이 성공 메시지 표시)
        const form = document.getElementById('contact-form');
        const successMsg = document.getElementById('success-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(form);
            const res = await fetch(form.action, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            });
            if (res.ok) {
                form.reset();
                form.style.display = 'none';
                successMsg.style.display = 'block';
            } else {
                alert('전송에 실패했습니다. 잠시 후 다시 시도해주세요.');
            }
        });
    </script>
</body>
</html>
