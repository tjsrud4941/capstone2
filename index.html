<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나는 강아지상? 고양이상? 🐾</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>

    <!-- 인트로 -->
    <section class="intro" id="intro">
        <div class="intro-inner">
            <div class="emoji-row">🐶 🐱</div>
            <h1>나는 <span class="hl">강아지상</span>?<br><span class="hl2">고양이상</span>?</h1>
            <p class="intro-desc">사진 한 장으로 알아보는 동물상 테스트<br>AI가 당신의 얼굴을 분석해드립니다!</p>
            <button class="start-btn" id="start-btn">테스트 시작하기 →</button>
        </div>
    </section>

    <!-- 테스트 -->
    <section class="test-section hidden" id="test-section">
        <div class="test-inner">
            <h2 class="test-title">사진을 올려주세요</h2>
            <p class="test-sub">얼굴이 잘 보이는 정면 사진일수록 정확해요!</p>

            <!-- 업로드 영역 -->
            <div class="upload-area" id="upload-area">
                <input type="file" id="file-input" accept="image/*" hidden>
                <div class="upload-placeholder" id="upload-placeholder">
                    <div class="upload-icon">📷</div>
                    <p>클릭하거나 사진을 드래그하세요</p>
                    <span>JPG, PNG, WEBP 지원</span>
                </div>
                <img id="preview-img" class="preview-img hidden" alt="미리보기">
            </div>

            <div class="btn-row">
                <button class="upload-btn" id="upload-btn">📁 사진 선택</button>
                <button class="analyze-btn hidden" id="analyze-btn">✨ 분석하기</button>
            </div>

            <!-- 로딩 -->
            <div class="loading hidden" id="loading">
                <div class="spinner"></div>
                <p>AI가 분석 중이에요...</p>
            </div>
        </div>
    </section>

    <!-- 결과 -->
    <section class="result-section hidden" id="result-section">
        <div class="result-inner">
            <div class="result-emoji" id="result-emoji"></div>
            <h2 class="result-label" id="result-label"></h2>
            <p class="result-desc" id="result-desc"></p>

            <!-- 게이지 바 -->
            <div class="gauge-wrap">
                <div class="gauge-labels">
                    <span>🐶 강아지상</span>
                    <span>고양이상 🐱</span>
                </div>
                <div class="gauge-bar">
                    <div class="gauge-fill" id="gauge-fill"></div>
                </div>
                <div class="gauge-pcts">
                    <span id="dog-pct"></span>
                    <span id="cat-pct"></span>
                </div>
            </div>

            <div class="result-btns">
                <button class="retry-btn" id="retry-btn">🔄 다시 테스트</button>
            </div>
        </div>
    </section>

    <script src="main.js"></script>
</body>
</html>
